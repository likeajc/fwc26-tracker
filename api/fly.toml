# Fly.io configuration for the FWC26 Tracker API (Path B: API + live updater).
#
# One always-on machine runs BOTH the API and the 24/7 live updater (via PM2 —
# see Dockerfile + ecosystem.config.js). The machine must NOT auto-stop, or the
# updater would stop polling live scores.
#
# `app` must be globally unique on Fly — `fly launch` will set/prompt for it.
# Full instructions: ../docs/deploy-flyio.md

app = "fwc26-tracker-api"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3050"
  ENABLE_SWAGGER = "false"
  # Secrets (MONGODB_URL, JWT_SECRET, SECRET, ACCESSCODEDEV, CORS_ORIGINS)
  # are set with `fly secrets set ...` — never put them here.

[http_service]
  internal_port = 3050
  force_https = true
  # Keep the single machine running 24/7 so the live updater never stops.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"

# Two Node processes (API + updater) — 512MB is the realistic minimum.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
