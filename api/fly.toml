# fly.toml app configuration file generated for fwc26-tracker-api on 2026-06-21T02:28:37-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fwc26-tracker-api'
primary_region = 'iad'

[build]

[env]
  API_URL = 'https://fwc26-tracker-api.fly.dev'
  ENABLE_SWAGGER = 'true'
  NODE_ENV = 'production'
  PORT = '3050'

[http_service]
  internal_port = 3050
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
